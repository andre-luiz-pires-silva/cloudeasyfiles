<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CloudEasyFiles</title>
    <link rel="stylesheet" href="./styles.css" />
    <script type="module" src="./main.js" defer></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="hero-card">
        <p class="eyebrow">Cloud Storage Explorer</p>
        <h1 id="greeting">Loading CloudEasyFiles...</h1>
        <p class="subtitle">
          A lightweight desktop foundation built with Tauri and Rust for
          managing files across AWS S3 and Azure Blob Storage.
        </p>

        <div class="status-grid">
          <article class="status-card">
            <span class="status-label">Frontend</span>
            <strong>HTML, CSS and JavaScript</strong>
          </article>
          <article class="status-card">
            <span class="status-label">Backend</span>
            <strong>Rust with Tauri commands</strong>
          </article>
          <article class="status-card">
            <span class="status-label">Architecture</span>
            <strong>Clean and extensible starting point</strong>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
