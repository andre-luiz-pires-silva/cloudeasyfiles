name: Publish Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            patchelf
          sudo apt-get install -y libayatana-appindicator3-dev || sudo apt-get install -y libappindicator3-dev

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Run repository checks
        run: npm run check

      - name: Build Linux bundles
        run: npm run tauri:build

      - name: Upload Linux bundles
        uses: actions/upload-artifact@v6
        with:
          name: release-bundles-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Run repository checks
        run: npm run check

      - name: Build Windows bundles
        run: npm run tauri:build

      - name: Upload Windows bundles
        uses: actions/upload-artifact@v6
        with:
          name: release-bundles-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-windows

    steps:
      - name: Download Linux bundles
        uses: actions/download-artifact@v5
        with:
          name: release-bundles-linux
          path: release-assets

      - name: Download Windows bundles
        uses: actions/download-artifact@v5
        with:
          name: release-bundles-windows
          path: release-assets

      - name: Generate checksums
        run: |
          cd release-assets
          find . -type f \
            \( -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" -o -name "*.msi" -o -name "*.exe" \) \
            -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt

      - name: Create or update GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          mapfile -d '' ASSET_FILES < <(
            find release-assets -type f \
              \( -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" -o -name "*.msi" -o -name "*.exe" \) \
              -print0 | sort -z
          )

          ASSET_FILES+=("release-assets/SHA256SUMS.txt")

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "${ASSET_FILES[@]}" --clobber
          else
            gh release create "$TAG_NAME" \
              "${ASSET_FILES[@]}" \
              --verify-tag \
              --generate-notes \
              --title "$TAG_NAME"
          fi
