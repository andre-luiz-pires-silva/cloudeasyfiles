name: Release Build

on:
  workflow_dispatch:

jobs:
  linux-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            patchelf
          sudo apt-get install -y libayatana-appindicator3-dev || sudo apt-get install -y libappindicator3-dev

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Build Linux bundles
        run: npm run tauri:build

      - name: Generate checksums
        run: |
          cd src-tauri/target/release/bundle
          sha256sum \
            deb/*.deb \
            rpm/*.rpm \
            appimage/*.AppImage \
            > SHA256SUMS.txt

      - name: Upload Linux release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: cloudeasyfiles-linux-bundles
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/SHA256SUMS.txt
