name: Feature request
description: Propose a product or engineering improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What is missing or painful today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the desired behavior or outcome.
    validations:
      required: true
  - type: textarea
    id: tradeoffs
    attributes:
      label: Constraints or tradeoffs
      description: Include provider differences, UX concerns, or implementation limits if relevant.
